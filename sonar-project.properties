sonar.projectKey=claude-killer
sonar.projectName=Claude Killer
sonar.projectVersion=1.0
sonar.sources=src
sonar.exclusions=**/node_modules/**,**/__tests__/**,**/*.test.ts
sonar.tests=src/__tests__
sonar.test.inclusions=**/*.test.ts
sonar.sourceEncoding=UTF-8
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Suppress S3776 (cognitive complexity) for files where the complexity is
# inherent to the problem domain (multi-step validation, agent loop dispatch,
# etc). These functions have been reviewed and their complexity is justified.
sonar.issue.ignore.multicriteria=e1,e2,e3,e4,e5,e6,e7,e8,e9,e10,e11,e12
