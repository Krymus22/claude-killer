name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─── Job 1: Type-check + Lint ────────────────────────────────────────────
  typecheck:
    name: TypeScript Type-Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit

  # ─── Job 2: Tests + Coverage ─────────────────────────────────────────────
  test:
    name: Tests + Coverage
    runs-on: ubuntu-latest
    env:
      NVIDIA_API_KEY: dummy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Run tests with coverage
        run: npx vitest run --coverage --coverage.reporter=lcov --coverage.reporter=text-summary
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 7

  # ─── Job 3: SonarQube (optional — requires SONAR_TOKEN secret) ───────────
  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    # Only run if SONAR_TOKEN is configured
    if: ${{ secrets.SONAR_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones need to be disabled for SonarQube
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Generate coverage
        env:
          NVIDIA_API_KEY: dummy
        run: npx vitest run --coverage --coverage.reporter=lcov --coverage.reportsDirectory=coverage
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
